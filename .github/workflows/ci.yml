name: DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ==================== SAST - Bandit ====================
  sast-bandit:
    runs-on: ubuntu-latest
    name: SAST - Bandit (Python)
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Bandit
        run: pip install bandit
      
      - name: Check for Python files
        id: check_python
        run: |
          if find . -name "*.py" -type f | grep -q .; then
            echo "has_python=true" >> $GITHUB_OUTPUT
            echo "✅ Python files found"
          else
            echo "has_python=false" >> $GITHUB_OUTPUT
            echo "⚠️ No Python files - skipping Bandit"
          fi
      
      - name: Run Bandit
        if: steps.check_python.outputs.has_python == 'true'
        run: |
          mkdir -p reports
          bandit -r . -f json -o reports/bandit-report.json
          echo "✅ Bandit scan completed"
        continue-on-error: true
      
      - name: Create empty report if skipped
        if: steps.check_python.outputs.has_python == 'false'
        run: |
          mkdir -p reports
          echo '{"issues": [], "skipped": true, "reason": "No Python files"}' > reports/bandit-report.json
      
      - name: Upload Bandit Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: reports/bandit-report.json
          retention-days: 30

  # ==================== Secrets - GitLeaks ====================
  secrets-scan:
    runs-on: ubuntu-latest
    name: Secrets - GitLeaks
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Run GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        continue-on-error: true

  # ==================== Security Gateway ====================
  security-gateway:
    runs-on: ubuntu-latest
    needs: [sast-bandit, secrets-scan]
    name: Security Gateway
    if: always()
    steps:
      - name: Security Gate Check
        run: |
          echo "==================================="
          echo "  🔒 SECURITY GATEWAY CHECK"
          echo "==================================="
          echo "✅ All security scans completed"
          echo "📊 Review reports in Artifacts tab"
          echo "==================================="
          echo ""
          echo "Pipeline Summary:"
          echo "  • SAST (Bandit): ${{ needs.sast-bandit.result }}"
          echo "  • Secrets (GitLeaks): ${{ needs.secrets-scan.result }}"
          echo "==================================="
